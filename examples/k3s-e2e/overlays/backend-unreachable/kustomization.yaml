apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: ConfigMap
      name: meridian-e2e-settings
    patch: |-
      - op: replace
        path: /data/MERIDIAN_SCENARIO
        value: backend-unreachable
      - op: replace
        path: /data/MERIDIAN_OTLP_ENDPOINT
        value: otel-gateway-missing.observability.svc.cluster.local:4317
