apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: ConfigMap
      name: meridian-e2e-settings
    patch: |-
      - op: replace
        path: /data/MERIDIAN_SCENARIO
        value: misroute-logs
      - op: replace
        path: /data/MERIDIAN_DISABLE_APP_LOGS
        value: "true"
