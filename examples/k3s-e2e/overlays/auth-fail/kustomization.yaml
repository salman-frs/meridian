apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: ConfigMap
      name: meridian-e2e-settings
    patch: |-
      - op: replace
        path: /data/MERIDIAN_SCENARIO
        value: auth-fail
      - op: replace
        path: /data/MERIDIAN_OUTBOUND_TOKEN
        value: meridian-invalid-token
      - op: replace
        path: /data/MERIDIAN_EXPECT_CHECKOUT_STATUS
        value: "502"
