site_name: Meridian
site_description: Engineering documentation for Meridian, the CLI and GitHub Action for reviewing OpenTelemetry Collector configuration changes.
site_url: https://salman-frs.github.io/meridian/
repo_url: https://github.com/salman-frs/meridian
repo_name: salman-frs/meridian
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo/wordmark.svg
  favicon: assets/logo/mark.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber

plugins:
  - search
  - mermaid2
  - redirects:
      redirect_maps:
        overview/quickstart.md: getting-started/quickstart.md
        overview/install.md: getting-started/install.md
        overview/releases.md: project/release-docs.md
        concepts/runtime-modes.md: core-concepts/runtime-modes-and-patching.md
        concepts/semantic-validation.md: core-concepts/semantic-validation.md
        concepts/diff-review.md: features/diff.md
        concepts/artifacts.md: core-concepts/artifact-model.md
        concepts/runtime-engines.md: core-concepts/runtime-engine-model.md
        concepts/k3s-fixture.md: features/k3s-fixture.md
        tasks/first-run.md: getting-started/first-local-run.md
        tasks/container-engines.md: core-concepts/runtime-engine-model.md
        tasks/assertions-contracts.md: features/assertions-and-contracts.md
        tasks/diff-a-change.md: features/diff.md
        tasks/inspect-artifacts.md: features/debug-commands.md
        tasks/debug-failures.md: features/runtime-commands.md
        tasks/github-action.md: features/github-action.md
        tutorials/local-validation.md: workflows/local-authoring.md
        tutorials/pull-request-flow.md: workflows/reviewer-pull-request.md
        tutorials/k3s-regression.md: workflows/maintainer-regression.md
        contribute/index.md: project/contributing.md
        contribute/docs.md: project/docs-authoring.md
        contribute/releases.md: project/release-docs.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike

extra_css:
  - assets/stylesheets/extra.css

validation:
  omitted_files: warn
  absolute_links: relative_to_docs
  unrecognized_links: warn

nav:
  - Home: index.md
  - Overview:
      - overview/index.md
      - Goals and Non-Goals: overview/goals-and-non-goals.md
      - Users and Use Cases: overview/users-and-use-cases.md
      - Main Features: overview/main-features.md
  - Getting Started:
      - getting-started/index.md
      - Install: getting-started/install.md
      - Quickstart: getting-started/quickstart.md
      - First Local Run: getting-started/first-local-run.md
      - First CI Setup: getting-started/first-ci-setup.md
  - Core Concepts:
      - core-concepts/index.md
      - Evidence Model: core-concepts/evidence-model.md
      - Config Source Model: core-concepts/config-source-model.md
      - Semantic Validation: core-concepts/semantic-validation.md
      - Runtime Modes and Patching: core-concepts/runtime-modes-and-patching.md
      - Runtime Engine Model: core-concepts/runtime-engine-model.md
      - Artifact Model: core-concepts/artifact-model.md
  - Feature Deep Dives:
      - features/index.md
      - Validate: features/validate.md
      - Graph: features/graph.md
      - Diff: features/diff.md
      - Runtime Commands: features/runtime-commands.md
      - Assertions and Contracts: features/assertions-and-contracts.md
      - Debug Commands: features/debug-commands.md
      - GitHub Action: features/github-action.md
      - K3s Fixture: features/k3s-fixture.md
  - Recommended Workflows:
      - workflows/index.md
      - Local Authoring Workflow: workflows/local-authoring.md
      - Reviewer Pull Request Workflow: workflows/reviewer-pull-request.md
      - CI Maintainer Workflow: workflows/ci-maintainer.md
      - Meridian Maintainer Regression Workflow: workflows/maintainer-regression.md
  - Architecture:
      - architecture/index.md
      - System Architecture: architecture/system-architecture.md
      - Execution Pipeline: architecture/execution-pipeline.md
      - Package Map: architecture/package-map.md
      - Reporting and Artifacts: architecture/reporting-and-artifacts.md
      - CI and Docs Publishing: architecture/ci-and-docs-publishing.md
  - Reference:
      - reference/index.md
      - CLI Overview: reference/cli-overview.md
      - GitHub Action Reference: reference/action.md
      - Artifact Contract: reference/artifact-contract.md
      - Config Inputs: reference/config-inputs.md
      - Examples: reference/examples.md
      - Exit Codes: reference/exit-codes.md
      - CLI Reference:
          - Generated CLI Reference: reference/cli/index.md
          - meridian: reference/cli/meridian.md
          - meridian check: reference/cli/meridian_check.md
          - meridian ci: reference/cli/meridian_ci.md
          - meridian completion: reference/cli/meridian_completion.md
          - meridian debug: reference/cli/meridian_debug.md
          - meridian debug bundle: reference/cli/meridian_debug_bundle.md
          - meridian debug capture: reference/cli/meridian_debug_capture.md
          - meridian debug logs: reference/cli/meridian_debug_logs.md
          - meridian debug summary: reference/cli/meridian_debug_summary.md
          - meridian diff: reference/cli/meridian_diff.md
          - meridian graph: reference/cli/meridian_graph.md
          - meridian test: reference/cli/meridian_test.md
          - meridian validate: reference/cli/meridian_validate.md
          - meridian version: reference/cli/meridian_version.md
  - Project:
      - project/index.md
      - Contributing: project/contributing.md
      - Docs Authoring: project/docs-authoring.md
      - Release Docs Workflow: project/release-docs.md
