name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_DIR="dist/meridian-${GOOS}-${GOARCH}"
          mkdir -p "$BIN_DIR"
          go build -o "$BIN_DIR/meridian" ./cmd/meridian
          tar -C "$BIN_DIR" -czf "dist/meridian-${GOOS}-${GOARCH}.tar.gz" meridian
          rm -rf "$BIN_DIR"
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridian-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish:
    needs: build-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -name '*.tar.gz' -exec mv {} release/ \;
      - name: Create checksums
        run: |
          cd release
          sha256sum *.tar.gz > checksums.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/checksums.txt
