name: docs

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Generate CLI reference
        run: go run ./cmd/meridian-docs

      - name: Fail on generated docs drift
        run: git diff --exit-code

      - name: Build docs site
        run: mkdocs build --strict

  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Generate CLI reference
        run: go run ./cmd/meridian-docs

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true

      - name: Deploy dev docs
        run: mike deploy --push dev

  deploy-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Generate CLI reference
        run: go run ./cmd/meridian-docs

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true

      - name: Deploy release docs
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${GIT_TAG#v}"
          SERIES="$(printf '%s' "$VERSION" | awk -F. '{print $1 "." $2}')"
          mike deploy --push --update-aliases "$SERIES" latest
          mike set-default --push latest

      - name: Prune old release docs
        run: |
          python - <<'PY'
          import re
          import subprocess

          output = subprocess.run(["mike", "list"], check=True, capture_output=True, text=True).stdout
          versions = []
          for line in output.splitlines():
              fields = line.strip().split()
              if not fields:
                  continue
              name = fields[0]
              if re.fullmatch(r"\d+\.\d+", name):
                  versions.append(tuple(int(part) for part in name.split(".")))

          versions.sort()
          for major, minor in versions[:-5]:
              subprocess.run(["mike", "delete", "--push", f"{major}.{minor}"], check=True)
          PY
